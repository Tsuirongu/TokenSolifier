<!-- 编辑模块内容 -->
<div class="clipboard-edit-modal" id="edit-modal" style="display: none;">
    <div class="modal-content" data-wails-no-drag>
        <div class="modal-header">
            <h3>编辑内容</h3>
            <button class="modal-close-btn" id="modal-close-btn">×</button>
        </div>
        <div class="modal-body">
            <textarea
                id="edit-textarea"
                class="edit-textarea"
                placeholder="编辑内容..."
                rows="10"
            ></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" id="edit-cancel-btn">取消</button>
            <button class="btn-primary" id="edit-save-btn">保存</button>
        </div>
    </div>
</div>
