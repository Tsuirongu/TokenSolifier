<!-- 剪贴板模块内容 -->
<!-- 搜索栏 -->
<div class="clipboard-search" data-wails-no-drag>
    <input
        type="text"
        id="clipboard-search-input"
        class="search-input"
        placeholder="搜索剪贴板内容..."
    />
    <button class="search-clear-btn" id="search-clear-btn" style="display: none;">×</button>
</div>

<!-- 工具栏 -->
<div class="clipboard-toolbar" data-wails-no-drag>
    <button class="toolbar-btn" id="clear-all-btn" title="清空全部">
        <span>⌫ 清空</span>
    </button>
    <div class="clipboard-count">
        共 <span id="clipboard-count">0</span> 条
    </div>
</div>

<!-- 剪贴板列表 -->
<div class="clipboard-content" data-wails-no-drag>
    <div class="clipboard-list" id="clipboard-list">
        <div class="empty-state">
            <div class="empty-icon">☰</div>
            <p>还没有剪贴板历史</p>
            <p class="empty-hint">复制的内容会自动记录在这里</p>
        </div>
    </div>
</div>
